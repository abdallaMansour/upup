<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لون الصفحة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #4361ee;
      --primary-light: #e8ecff;
      --accent: #f72585;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #9a9ab0;
      --border: #e4e6ef;
      --badge-products: #4361ee;
      --badge-follow: #e8ecff;
      --badge-follow-text: #4361ee;
      --selected-border: #4361ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── Header ── */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .header-logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .header-hint {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--primary-light);
      padding: 6px 14px;
      border-radius: 20px;
    }

    /* ── Main wrapper ── */
    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
      text-align: right;
    }

    /* ── Theme Grid ── */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 52px;
    }

    .theme-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px 14px;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .theme-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.1);
    }
    .theme-card.active {
      border-color: var(--selected-border);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--selected-border) 18%, transparent);
    }

    /* mini profile inside card */
    .mini-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .mini-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--border);
      position: relative;
    }
    .mini-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      left: 0;
      border: 2px solid var(--card-bg);
    }
    .mini-lines {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }
    .mini-line {
      height: 8px;
      border-radius: 4px;
      background: var(--border);
    }
    .mini-line.short { width: 55%; margin: 0 auto; }
    .mini-line.long  { width: 80%; margin: 0 auto; }

    .mini-badges {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .mini-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .mini-badge.products {
      background: var(--badge-products);
      color: #fff;
    }
    .mini-badge.follow {
      background: var(--badge-follow);
      color: var(--badge-follow-text);
    }

    .theme-label {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-top: 10px;
    }

    /* check mark for active */
    .theme-card.active::after {
      content: '✓';
      position: absolute;
      top: 10px;
      left: 10px;
      width: 22px;
      height: 22px;
      background: var(--selected-border);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 22px;
      text-align: center;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 40px;
    }

    /* ── Personal link preview ── */
    .personal-link-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .personal-link-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 700;
    }
    .personal-link-label svg { color: var(--primary); }
    .personal-link-url {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      direction: ltr;
    }

    /* ── Save button ── */
    .btn-save {
      display: block;
      margin: 36px auto 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 48px;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 18px color-mix(in srgb, var(--primary) 40%, transparent);
    }
    .btn-save:hover { opacity: .88; transform: translateY(-1px); }
    .btn-save:active { transform: translateY(0); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-logo">تخصيص الصفحة</span>
    <span class="header-hint">الأبعاد الموصى بها 1920 × 380 بيكسل</span>
  </header>

  <div class="wrapper">
    <h2 class="section-title">لون الصفحة</h2>

    <div class="theme-grid" id="themeGrid"></div>

    <hr class="divider"/>

    <div class="personal-link-box">
      <span class="personal-link-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        معاينة الرابط الشخصي
      </span>
      <span class="personal-link-url">store.example.com/my-page</span>
    </div>

    <button class="btn-save" onclick="saveTheme()">حفظ التغييرات</button>
  </div>

  <div class="toast" id="toast">✓ تم حفظ لون الصفحة بنجاح</div>

  <script>
    const themes = [
      {
        id: 'default',
        label: 'افتراضي',
        primary: '#4361ee',
        primaryLight: '#e8ecff',
        dot: '#4361ee',
        bg: '#f5f6fa',
        badgeProducts: '#4361ee',
        badgeFollow: '#e8ecff',
        badgeFollowText: '#4361ee',
        selected: '#4361ee',
      },
      {
        id: 'red',
        label: 'أحمر الكرز',
        primary: '#e63946',
        primaryLight: '#fde8ea',
        dot: '#e63946',
        bg: '#fff5f5',
        badgeProducts: '#e63946',
        badgeFollow: '#fde8ea',
        badgeFollowText: '#e63946',
        selected: '#e63946',
      },
      {
        id: 'purple',
        label: 'أرجواني مشع',
        primary: '#7209b7',
        primaryLight: '#f0e4ff',
        dot: '#9b4dca',
        bg: '#faf5ff',
        badgeProducts: '#7209b7',
        badgeFollow: '#f0e4ff',
        badgeFollowText: '#7209b7',
        selected: '#7209b7',
      },
      {
        id: 'pink',
        label: 'موف نابض',
        primary: '#f72585',
        primaryLight: '#ffe0f0',
        dot: '#f72585',
        bg: '#fff5fa',
        badgeProducts: '#f72585',
        badgeFollow: '#ffe0f0',
        badgeFollowText: '#f72585',
        selected: '#f72585',
      },
      {
        id: 'royal',
        label: 'أزرق ملكي',
        primary: '#1d3557',
        primaryLight: '#dde8f7',
        dot: '#457b9d',
        bg: '#f0f4f8',
        badgeProducts: '#1d3557',
        badgeFollow: '#dde8f7',
        badgeFollowText: '#1d3557',
        selected: '#1d3557',
      },
      {
        id: 'forest',
        label: 'أخضر الغابات',
        primary: '#2d6a4f',
        primaryLight: '#d8f3e0',
        dot: '#52b788',
        bg: '#f0faf4',
        badgeProducts: '#2d6a4f',
        badgeFollow: '#d8f3e0',
        badgeFollowText: '#2d6a4f',
        selected: '#2d6a4f',
      },
      {
        id: 'teal',
        label: 'فيروزي المحيط',
        primary: '#0096c7',
        primaryLight: '#caf0f8',
        dot: '#0096c7',
        bg: '#f0faff',
        badgeProducts: '#0096c7',
        badgeFollow: '#caf0f8',
        badgeFollowText: '#0096c7',
        selected: '#0096c7',
      },
      {
        id: 'sky',
        label: 'أزرق سماوي',
        primary: '#4895ef',
        primaryLight: '#dbeeff',
        dot: '#4895ef',
        bg: '#f5faff',
        badgeProducts: '#4895ef',
        badgeFollow: '#dbeeff',
        badgeFollowText: '#4895ef',
        selected: '#4895ef',
      },
      {
        id: 'orange',
        label: 'برتقالي الغروب',
        primary: '#f4811f',
        primaryLight: '#fff0e0',
        dot: '#f4811f',
        bg: '#fffaf5',
        badgeProducts: '#f4811f',
        badgeFollow: '#fff0e0',
        badgeFollowText: '#f4811f',
        selected: '#f4811f',
      },
      {
        id: 'tutti',
        label: 'توتي فروتي',
        primary: '#ff595e',
        primaryLight: '#ffe8e9',
        dot: '#ff595e',
        bg: '#fff8f8',
        badgeProducts: '#ff595e',
        badgeFollow: '#ffe8e9',
        badgeFollowText: '#ff595e',
        selected: '#ff595e',
      },
      {
        id: 'lemon',
        label: 'ليموني منعش',
        primary: '#80b918',
        primaryLight: '#eef6d6',
        dot: '#80b918',
        bg: '#f8fff0',
        badgeProducts: '#80b918',
        badgeFollow: '#eef6d6',
        badgeFollowText: '#5a8a0a',
        selected: '#80b918',
      },
      {
        id: 'emerald',
        label: 'أخضر الزمرد',
        primary: '#06d6a0',
        primaryLight: '#d9fdf3',
        dot: '#06d6a0',
        bg: '#f0fdf9',
        badgeProducts: '#06d6a0',
        badgeFollow: '#d9fdf3',
        badgeFollowText: '#028a65',
        selected: '#06d6a0',
      },
    ];

    let activeId = 'default';

    function applyTheme(t) {
      const r = document.documentElement.style;
      r.setProperty('--primary',            t.primary);
      r.setProperty('--primary-light',      t.primaryLight);
      r.setProperty('--bg',                 t.bg);
      r.setProperty('--badge-products',     t.badgeProducts);
      r.setProperty('--badge-follow',       t.badgeFollow);
      r.setProperty('--badge-follow-text',  t.badgeFollowText);
      r.setProperty('--selected-border',    t.selected);
    }

    function buildGrid() {
      const grid = document.getElementById('themeGrid');
      themes.forEach(t => {
        const card = document.createElement('div');
        card.className = 'theme-card' + (t.id === activeId ? ' active' : '');
        card.dataset.id = t.id;
        card.innerHTML = `
          <div class="mini-profile">
            <div class="mini-avatar" style="background:#e4e6ef;">
              <div class="mini-dot" style="background:${t.dot};"></div>
            </div>
            <div class="mini-lines">
              <div class="mini-line long"></div>
              <div class="mini-line short"></div>
            </div>
            <div class="mini-badges">
              <span class="mini-badge follow" style="background:${t.badgeFollow};color:${t.badgeFollowText};">تابع</span>
              <span class="mini-badge products" style="background:${t.badgeProducts};">المنتجات</span>
            </div>
          </div>
          <div class="theme-label">${t.label}</div>
        `;
        card.addEventListener('click', () => {
          document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          activeId = t.id;
          applyTheme(t);
        });
        grid.appendChild(card);
      });
    }

    function saveTheme() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    buildGrid();
    applyTheme(themes.find(t => t.id === activeId));
  </script>
</body>
</html>
